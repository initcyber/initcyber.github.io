<div class="header">
  <div class="container">
    <div class="logo">
      <a href="{{ site.baseurl }}">
        <img height="{{ site.logo.desktop_height }}" alt="{{ site.title }}" src="{{ site.logo.desktop | relative_url }}" style="width: auto; display: block;" />
      </a>
    </div>
    <div class="logo-mobile">
      <a href="{{ site.baseurl }}">
        <img height="{{ site.logo.mobile_height }}" alt="{{ site.title }}" src="{{ site.logo.mobile | relative_url }}" style="width: auto; display: block;" />
      </a>
    </div>
    {% include main-menu.html %}
    <div class="header-cta">
      <a href="/contact/" class="btn btn-primary">Get a Quote</a>
    </div>
    {% include hamburger.html %}
  </div>
</div>
