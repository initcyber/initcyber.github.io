<section class="mini-hero">
  <div class="container">
    <div class="mini-hero-content">
      <h1 class="mini-hero-title">{{ page.mini_hero_title | default: page.title }}</h1>
      {% if page.mini_hero_subtitle %}
      <p class="mini-hero-subtitle">{{ page.mini_hero_subtitle }}</p>
      {% endif %}
    </div>
  </div>
</section>
