baseurl: '/'
permalink: /:year/:month/:day/:title/
title: 'Init Cyber - CMMC Compliance Made Simple'
description: 'CMMC consulting and compliance services for defense contractors. C3PAO certified assessments and expertise.'

logo:
  mobile: "images/logo/logo-mobile.png"
  mobile_height: "36px"
  mobile_width: "auto"
  desktop: "images/logo/logo.png"
  desktop_height: "44px"
  desktop_width: "auto"

collections:
  team:
    output: true

defaults:
  - scope:
      path: ""
      type: "team"
    values:
      layout: "team"

sass:
  style: compressed # possible values: nested expanded compact compressed

plugins:
  - jekyll-environment-variables

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - LICENSE
  - README.md
