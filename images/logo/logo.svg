<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60" width="260" height="60">
  <defs>
    <linearGradient id="initGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#29ABE2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077B6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Top-left bracket -->
  <line x1="2" y1="18" x2="2" y2="4" stroke="#29ABE2" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2" y1="4" x2="16" y2="4" stroke="#29ABE2" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "Init" text -->
  <text x="22" y="44"
    font-family="'Hanken Grotesk', 'Inter', Arial, sans-serif"
    font-size="36"
    font-weight="700"
    fill="url(#initGrad)"
    letter-spacing="-0.5">Init</text>

  <!-- "Cyber" text -->
  <text x="108" y="44"
    font-family="'Hanken Grotesk', 'Inter', Arial, sans-serif"
    font-size="36"
    font-weight="700"
    fill="#1B2B5B"
    letter-spacing="-0.5">Cyber</text>

  <!-- Bottom-right bracket -->
  <line x1="258" y1="42" x2="258" y2="56" stroke="#6BBDE8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="244" y1="56" x2="258" y2="56" stroke="#6BBDE8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
</svg>
